version: "3.7"

services:
  mariadb:
    image: mariadb:10.6
    environment:
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mariadb-data:/var/lib/mysql
    ports:
      - "3306:3306"

  redis-cache:
    image: redis:6.2-alpine
    volumes:
      - redis-cache-data:/data

  redis-queue:
    image: redis:6.2-alpine
    volumes:
      - redis-queue-data:/data

  redis-socketio:
    image: redis:6.2-alpine
    volumes:
      - redis-socketio-data:/data

  frappe-web:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - DB_HOST=mariadb
      - REDIS_CACHE=redis-cache:6379
      - REDIS_QUEUE=redis-queue:6379
      - REDIS_SOCKETIO=redis-socketio:6379
    volumes:
      - assets-volume:/home/frappe/frappe-bench/sites/assets
      - sites-volume:/home/frappe/frappe-bench/sites
    ports:
      - "8000:8000"
    depends_on:
      - mariadb
      - redis-cache
      - redis-queue
      - redis-socketio

  frappe-worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: bench worker --queue default
    environment:
      - DB_HOST=mariadb
      - REDIS_CACHE=redis-cache:6379
      - REDIS_QUEUE=redis-queue:6379
      - REDIS_SOCKETIO=redis-socketio:6379
    volumes:
      - sites-volume:/home/frappe/frappe-bench/sites
    depends_on:
      - mariadb
      - redis-cache
      - redis-queue
      - redis-socketio

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - assets-volume:/usr/share/nginx/html/assets
      - sites-volume:/usr/share/nginx/html/sites
    ports:
      - "80:80"
    depends_on:
      - frappe-web

volumes:
  mariadb-data:
  redis-cache-data:
  redis-queue-data:
  redis-socketio-data:
  assets-volume:
  sites-volume:
